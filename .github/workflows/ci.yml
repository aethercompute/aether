name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  TORCH_VERSION: "2.9.1"
  TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject unannotated test skips
        run: |
          python - <<'PY'
          import ast
          import re
          from pathlib import Path

          errors = []
          for path in Path(".").rglob("*.rs"):
              if any(part in {"target", "vendor"} for part in path.parts):
                  continue
              for line_number, line in enumerate(path.read_text().splitlines(), 1):
                  if "#[ignore" in line and not re.search(r'#\[ignore\s*=\s*".+"\]', line):
                      errors.append(f"{path}:{line_number}: Rust #[ignore] requires a reason")

          for path in Path(".").rglob("*.py"):
              if any(part in {".venv", "target", "vendor"} for part in path.parts):
                  continue
              tree = ast.parse(path.read_text(), filename=str(path))
              for node in ast.walk(tree):
                  if not isinstance(node, ast.Call) or not isinstance(node.func, ast.Attribute):
                      continue
                  if not isinstance(node.func.value, ast.Name) or node.func.value.id != "pytest":
                      continue
                  if node.func.attr not in {"skip", "importorskip"}:
                      continue
                  reason = next((kw.value for kw in node.keywords if kw.arg == "reason"), None)
                  if not isinstance(reason, ast.Constant) or not isinstance(reason.value, str) or not reason.value.strip():
                      errors.append(
                          f"{path}:{node.lineno}: pytest.{node.func.attr} requires reason=..."
                      )

          assert not errors, "\n" + "\n".join(errors)
          PY
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-binstall
      - run: cargo binstall -y cargo-deny
      # Full supply-chain gate: advisories + bans + licenses + sources.
      # Transitive advisories that need major-version bumps (iroh/pyo3) are
      # acknowledged with reasons in deny.toml; any new advisory fails.
      - run: cargo deny --workspace check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-libtorch
        with:
          torch-version: ${{ env.TORCH_VERSION }}
          torch-index-url: ${{ env.TORCH_INDEX_URL }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-libtorch
        with:
          torch-version: ${{ env.TORCH_VERSION }}
          torch-index-url: ${{ env.TORCH_INDEX_URL }}
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - name: Rust workspace tests
        run: cargo nextest run --workspace --profile ci
      - name: Report slowest Rust tests
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          cases = ET.parse("target/nextest/ci/junit.xml").getroot().iter("testcase")
          slowest = sorted(
              (
                  (float(case.get("time", 0)), case.get("classname"), case.get("name"))
                  for case in cases
              ),
              reverse=True,
          )[:20]
          print("Slowest 20 Rust tests:")
          for duration, classname, name in slowest:
              print(f"{duration:8.3f}s  {classname}::{name}")
          PY
      - name: Rust doctests
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          result = subprocess.run(
              ["cargo", "test", "--workspace", "--doc", "--color", "never"],
              check=False,
              capture_output=True,
              text=True,
          )
          print(result.stdout, end="")
          print(result.stderr, end="", file=sys.stderr)
          if result.returncode:
              raise SystemExit(result.returncode)

          ignored = sum(
              int(count)
              for count in re.findall(r"(\d+) ignored", result.stdout + result.stderr)
          )
          assert ignored == 0, f"expected zero ignored doctests, found {ignored}"
          PY
      - name: Upload Rust test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-test-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: error

  python-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-libtorch
        with:
          torch-version: ${{ env.TORCH_VERSION }}
          torch-index-url: ${{ env.TORCH_INDEX_URL }}
      - name: Create Python test environment
        working-directory: python
        run: |
          uv venv --system-site-packages
          uv sync --frozen --extra tests
      - name: Verify required CPU dependencies
        working-directory: python
        run: uv run --frozen python -c "import torch, transformers, peft"
      - name: Python CPU tests
        working-directory: python
        run: |
          uv run --frozen pytest --junitxml=test-results.xml \
            --cov --cov-report=term --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov --cov-fail-under=19.5 \
            --durations=20 --durations-min=0
          uv run --frozen python - <<'PY'
          import xml.etree.ElementTree as ET

          suite = ET.parse("test-results.xml").getroot().find("testsuite")
          assert suite is not None, "pytest JUnit report has no testsuite"
          assert int(suite.get("tests", 0)) == 66, "expected exactly 66 Python tests"
          assert int(suite.get("skipped", 0)) == 0, "required Python tests must not skip"
          PY
      - name: Upload Python test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-cpu-test-artifacts
          path: |
            python/test-results.xml
            python/coverage.xml
            python/htmlcov
          if-no-files-found: error

  test-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-libtorch
        with:
          torch-version: ${{ env.TORCH_VERSION }}
          torch-index-url: ${{ env.TORCH_INDEX_URL }}
      - uses: Swatinem/rust-cache@v2
      - name: Discover Rust workspace tests
        run: cargo test --workspace --no-run
      - name: Create Python test environment
        working-directory: python
        run: |
          uv venv --system-site-packages
          uv sync --frozen --extra tests
      - name: Discover every Python test file
        working-directory: python
        run: |
          uv run --frozen python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          result = subprocess.run(
              [sys.executable, "-m", "pytest", "--collect-only", "-q", "--no-cov"],
              check=False,
              capture_output=True,
              text=True,
          )
          print(result.stdout, end="")
          print(result.stderr, end="", file=sys.stderr)
          if result.returncode:
              raise SystemExit(result.returncode)

          expected = {path.as_posix() for path in Path("tests").glob("test_*.py")}
          collected = {
              line.split("::", 1)[0]
              for line in result.stdout.splitlines()
              if "::" in line
          }
          missing = sorted(expected - collected)
          assert not missing, f"test files missing from pytest discovery: {missing}"
          PY

  coverage:
    runs-on: ubuntu-latest
    env:
      RUST_COVERAGE_IGNORE_REGEX: '(^|/)(vendor|examples|fixtures|test-data|test_data)(/|$)|(^|/)generated([^/]*)(/|$)'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-libtorch
        with:
          torch-version: ${{ env.TORCH_VERSION }}
          torch-index-url: ${{ env.TORCH_INDEX_URL }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          # cargo-llvm-cov uses a separate target directory
          cache-all-crates: true
      - name: Generate coverage
        run: |
          mkdir -p ./coverage
          cargo llvm-cov --workspace --no-report
          cargo llvm-cov report --ignore-filename-regex "$RUST_COVERAGE_IGNORE_REGEX" \
            --cobertura --output-path ./coverage/cobertura.xml
          cargo llvm-cov report --ignore-filename-regex "$RUST_COVERAGE_IGNORE_REGEX" \
            --html --output-dir ./coverage
          cargo llvm-cov report --ignore-filename-regex "$RUST_COVERAGE_IGNORE_REGEX" \
            --fail-under-lines 60.68 --fail-under-functions 63.67
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage
