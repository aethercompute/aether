name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  TORCH_VERSION: "2.9.1"
  TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-binstall
      - run: cargo binstall -y cargo-deny
      # Full supply-chain gate: advisories + bans + licenses + sources.
      # Transitive advisories that need major-version bumps (iroh/pyo3) are
      # acknowledged with reasons in deny.toml; any new advisory fails.
      - run: cargo deny --workspace check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            clang cmake protobuf-compiler libssl-dev pkg-config
      - name: Install PyTorch (CPU)
        run: pip install torch==${TORCH_VERSION} --index-url ${TORCH_INDEX_URL}
      - name: Configure libtorch env
        run: |
          echo "LIBTORCH_USE_PYTORCH=1" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(python -c 'import os, sysconfig, torch; print(os.path.join(os.path.dirname(torch.__file__), "lib") + ":" + (sysconfig.get_config_var("LIBDIR") or ""))')" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$(which python)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            clang cmake protobuf-compiler libssl-dev pkg-config
      - name: Install PyTorch (CPU)
        run: |
          pip install torch==${TORCH_VERSION} --index-url ${TORCH_INDEX_URL}
          pip install uv
      - name: Configure libtorch env
        run: |
          echo "LIBTORCH_USE_PYTORCH=1" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(python -c 'import os, sysconfig, torch; print(os.path.join(os.path.dirname(torch.__file__), "lib") + ":" + (sysconfig.get_config_var("LIBDIR") or ""))')" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$(which python)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
      - name: Rust workspace tests
        run: cargo test --workspace
      - name: Python tests
        working-directory: python
        run: uv run --frozen --extra tests pytest

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            clang cmake protobuf-compiler libssl-dev pkg-config
      - name: Install PyTorch (CPU)
        run: pip install torch==${TORCH_VERSION} --index-url ${TORCH_INDEX_URL}
      - name: Configure libtorch env
        run: |
          echo "LIBTORCH_USE_PYTORCH=1" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(python -c 'import os, sysconfig, torch; print(os.path.join(os.path.dirname(torch.__file__), "lib") + ":" + (sysconfig.get_config_var("LIBDIR") or ""))')" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$(which python)" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          # cargo-llvm-cov uses a separate target directory
          cache-all-crates: true
      - name: Generate coverage
        run: |
          mkdir -p ./coverage
          cargo llvm-cov --workspace --no-report
          cargo llvm-cov report --cobertura --output-path ./coverage/cobertura.xml
          cargo llvm-cov report --html --output-dir ./coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage
