name: deploy site

# Publishes the static landing page and client launcher to GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - website/index.html
      - scripts/aethercompute-client.sh
      - .github/workflows/deploy-client.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-client
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: assemble site
        run: |
          mkdir -p site
          cp website/index.html site/index.html
          cp scripts/aethercompute-client.sh site/client.sh
          printf 'aethercompute.org\n' > site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
