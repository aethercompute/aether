run_id = "deepseek-v3-dense-100m-1b-muon-gbs768"
run_state = "WaitingForMembers"

[config]
warmup_time = 120
cooldown_time = 5
epoch_time = 360
max_round_train_time = 40
round_witness_time = 14
min_clients = 1
init_min_clients = 1

# Fixed global batch size: 768 sequences * 512 tokens = 393,216 tokens/step.
# 120 steps consume 92,160 sequences = 47,185,920 tokens. Matches the
# state_lr_*.toml Distro LR-sweep format for a direct A/B.
global_batch_size_start = 768
global_batch_size_end = 768
global_batch_size_warmup_tokens = 0

verification_percent = 0
witness_nodes = 1
total_steps = 120
waiting_for_members_extra_time = 120

[model.LLM]
architecture = "HfDeepseek"
data_type = "Pretraining"
max_seq_len = 512
cold_start_warmup_steps = 0

[model.LLM.data_location]
Server = "167.233.75.197:39406"

[model.LLM.checkpoint.Hub]
repo_id = "aethercompute/deepseek-v3-dense-100m-1b-exp1"

[model.LLM.lr_schedule.Cosine]
# LR NOTE: this run uses sign-mode Muon (apply does `w -= lr·scale·sign(…)`), so
# every per-coordinate step is ±lr·scale — the SAME unit-magnitude structure as
# Distro's SignSGD (±lr), only with a better *direction* (orthogonalized) and a
# shape-derived scale (~1–2×). It is therefore on Distro's LR scale (~1e-3), NOT
# canonical Muon's (~0.02) — canonical 0.02 applies to *continuous* Muon
# (`w -= lr·O`, |O_ij|~1/√d), which is a different optimizer; 0.02 would diverge.
#
# Sqrt-scaled from the GBS-1536 baseline (1.47e-3): 1.47e-3 * sqrt(768/1536)
# = 1.47e-3 * 0.707 ≈ 1.04e-3 — which lands right on the Distro GBS-768 LR-sweep
# baseline (~1.0e-3, see state_lr_*.toml), as expected for a SignSGD-family optimizer.
base_lr = 1.04e-3
warmup_steps = 4
warmup_init_lr = 0.0
total_steps = 120
final_lr = 1.04e-4

# Muon optimizer: Newton-Schulz-orthogonalized Nesterov momentum over the same
# DisTrO compression/transport channel as Distro (DCT + top-k + 1-bit sign).
# 2D weights get orthogonalized; 1D norms/biases use the SGD-momentum fallback.
# Same compression params as the Distro run for an apples-to-apples bandwidth A/B.
[model.LLM.optimizer.Muon]
momentum = 0.95
weight_decay = 0.1
clip_grad_norm = 1.0
nesterov = true
ns_steps = 5
lookahead = false
compression_decay = 1.0
compression_topk = 8
compression_chunk = 64
quantize_1bit = true
