run_id = "llama32-3b-pirate-lora-r16"
run_state = "WaitingForMembers"

[config]
warmup_time = 120
cooldown_time = 10
epoch_time = 900
max_round_train_time = 300
round_witness_time = 20
min_clients = 1
init_min_clients = 1

# One SFT epoch over 10k examples: 625 steps * 16 sequences/step.
global_batch_size_start = 16
global_batch_size_end = 16
global_batch_size_warmup_tokens = 0

verification_percent = 0
witness_nodes = 1
total_steps = 625
waiting_for_members_extra_time = 120

[model.LLM]
architecture = "HfAuto"
data_type = "Finetuning"
max_seq_len = 2048
cold_start_warmup_steps = 0

[model.LLM.data_location]
Server = "127.0.0.1:39406"

[model.LLM.checkpoint.Hub]
repo_id = "meta-llama/Llama-3.2-3B-Instruct"
revision = "main"

[model.LLM.lr_schedule.Cosine]
base_lr = 2.0e-4
warmup_steps = 50
warmup_init_lr = 0.0
total_steps = 625
final_lr = 2.0e-5

[model.LLM.optimizer.Distro]
clip_grad_norm = 1.0
compression_decay = 0.999
compression_chunk = 64
compression_topk = 8
quantize_1bit = true
weight_decay = 0.0

[model.LLM.training_method.Lora]
rank = 16
alpha = 32.0
dropout = 0.05
init_seed = 1337
adapter_checkpoint = "Fresh"
