[server]
state_path = "config/lfm2.5-1.2b-reasoning-lora/state_distro.toml"
data_config = "config/lfm2.5-1.2b-reasoning-lora/data.toml"
experiment_path = "config/experiment-run.toml"
experiment_enabled = false
server_port = 39405
live_web_port = 8081
tui = false

[dataset]
enabled = true
objective = "sft"
script = "scripts/prepare-sft-local.py"
output_dir = "data/reasoning-v1-20m-first-6k-lfm2.5-1.2b-sft-16384"
sequence_length = 16384
num_sequences = 6000
shard_size = 256
dataset = "glaiveai/reasoning-v1-20m"
split = "train"
tokenizer = "LiquidAI/LFM2.5-1.2B-Instruct"
seed = 1337
buffer_docs = 0
trust_remote_code = false
sft_mode = "chat"
prompt_field = "prompt"
response_field = "response"

[model]
enabled = false

[checkpoint]
dir = "checkpoints/{run_id}"
hub_repo = "aethercompute/lfm25-1.2b-reasoning-lora-adapter"
gcs_bucket = ""
gcs_prefix = ""
delete_old_steps = true
keep_steps = 3
epoch_interval = 1
