run_id = "deepseek-v3-dense-250m-1b-lr-very-high"
run_state = "WaitingForMembers"

[config]
warmup_time = 120
cooldown_time = 5
epoch_time = 360
max_round_train_time = 40
round_witness_time = 14
min_clients = 1
init_min_clients = 1

# Fixed global batch size: 768 sequences * 512 tokens = 393,216 tokens/step.
# 120 steps consume 92,160 sequences = 47,185,920 tokens.
global_batch_size_start = 768
global_batch_size_end = 768
global_batch_size_warmup_tokens = 0

verification_percent = 0
witness_nodes = 1
total_steps = 120
waiting_for_members_extra_time = 120

[model.LLM]
architecture = "HfDeepseek"
data_type = "Pretraining"
max_seq_len = 512
cold_start_warmup_steps = 0

# Server data mode: the coordinator also hosts a DataProviderTcpServer (see the
# companion data.toml, passed via --data-config). Volunteers fetch only their
# assigned shard per round instead of each needing a local dataset copy. Because
# the coordinator hands each sequence to exactly one client once, total egress
# over the whole run is ~3.8 GB, not the full 20 GB on disk.
#
# This must be IP:PORT with the currently-deployed server binary — it parses the
# value as a SocketAddr, which rejects DNS names. Once psyche-centralized-server
# is rebuilt with the hostname fix in server/src/app.rs, switch this back to
# "train.aethercompute.org:39406". The host is what volunteers connect to; the
# port is both that and what the server binds (0.0.0.0:<port>) — expose 39406.
[model.LLM.data_location]
Server = "167.233.75.197:39406"

[model.LLM.checkpoint.Hub]
repo_id = "aethercompute/deepseek-v3-dense-250m-1b-lr-very-high"

[model.LLM.lr_schedule.Cosine]
# Very high LR variant: 1.25x the 1.0e-3 baseline.
base_lr = 1.25e-3
warmup_steps = 4
warmup_init_lr = 0.0
total_steps = 120
final_lr = 1.25e-4

[model.LLM.optimizer.Distro]
clip_grad_norm = 1.0
compression_decay = 0.999
compression_chunk = 64
compression_topk = 8
quantize_1bit = true
weight_decay = 0.1
