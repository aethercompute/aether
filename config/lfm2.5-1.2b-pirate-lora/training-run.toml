[server]
state_path = "config/lfm2.5-1.2b-pirate-lora/state_distro.toml"
data_config = "config/lfm2.5-1.2b-pirate-lora/data.toml"
experiment_path = "config/experiment-run.toml"
experiment_enabled = false
server_port = 39405
live_web_port = 8081
tui = false

[dataset]
enabled = true
objective = "sft"
script = "scripts/prepare-sft-local.py"
output_dir = "data/pirate-ultrachat-10k-lfm2.5-1.2b-sft-2048"
sequence_length = 2048
num_sequences = 9000
shard_size = 2048
dataset = "winglian/pirate-ultrachat-10k"
split = "train"
tokenizer = "LiquidAI/LFM2.5-1.2B-Instruct"
seed = 1337
buffer_docs = 10000
trust_remote_code = false
sft_mode = "messages"
messages_field = "messages"

[model]
enabled = false

[checkpoint]
dir = "checkpoints/{run_id}"
hub_repo = "aethercompute/lfm25-1.2b-pirate-lora-adapter"
gcs_bucket = ""
gcs_prefix = ""
delete_old_steps = true
keep_steps = 3
epoch_interval = 1
