[server]
state_path = "config/llama3.2-1b-reason/state.toml"
data_config = "config/llama3.2-1b-reason/data.toml"
experiment_path = "config/experiment-run.toml"
experiment_enabled = false
server_port = 39405
live_web_port = 8081
tui = false

[dataset]
enabled = true
objective = "sft"
script = "scripts/prepare-sft-local.py"
output_dir = "data/llama3.2-1b-reason-8192"
sequence_length = 8192
num_sequences = 0
shard_size = 2048
dataset = "Magpie-Align/Magpie-Reasoning-V2-250K-CoT-Llama3"
split = "train"
prompt_field = "instruction"
response_field = "response"
sft_mode = "chat"
system_prompt = ""
tokenizer = "meta-llama/Llama-3.2-1B-Instruct"
seed = 1337
buffer_docs = 0
trust_remote_code = false

[model]
enabled = true
config = "meta-llama/Llama-3.2-1B-Instruct"
repo = "aethercompute/llama3.2-1b-reason"
tokenizer = "meta-llama/Llama-3.2-1B-Instruct"
private = false
