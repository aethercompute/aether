[server]
state_path = "config/aether0-500m/state_distro.toml"
data_config = "config/aether0-500m/data.toml"
experiment_path = "config/experiment-run.toml"
experiment_enabled = false
server_port = 39405
live_web_port = 8081
tui = false

[dataset]
enabled = true
objective = "pretraining"
script = "scripts/prepare-ultra-fineweb-local.py"
output_dir = "data/corpus-512-bin"
sequence_length = 512
num_sequences = 5859328
shard_size = 2048
token_bytes = 4
dataset = "openbmb/Ultra-FineWeb"
split = "en"
text_field = "content"
tokenizer = "deepseek-ai/DeepSeek-V3"
seed = 1337
buffer_docs = 0
trust_remote_code = false

[model]
enabled = false
