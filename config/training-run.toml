[server]
state_path = "config/llama3.2-1b-pirate-sft/state.toml"
data_config = "config/llama3.2-1b-pirate-sft/data.toml"
experiment_path = "config/experiment-run.toml"
experiment_enabled = false
server_port = 39405
live_web_port = 8081
tui = false

[dataset]
enabled = true
objective = "sft"
script = "scripts/prepare-sft-local.py"
output_dir = "data/pirate-speak-llama3.2-1b-sft-1024"
sequence_length = 1024
num_sequences = 0
shard_size = 2048
dataset = "KafeisM/pirate-speak-dataset"
split = "train"
prompt_field = "english"
response_field = "pirate"
sft_mode = "chat"
system_prompt = ""
tokenizer = "meta-llama/Llama-3.2-1B-Instruct"
seed = 1337
buffer_docs = 0
trust_remote_code = false

[model]
enabled = false
