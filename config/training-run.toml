[server]
state_path = "config/aether0-2b/state.toml"
experiment_path = "config/experiment-run.toml"
server_port = 39405
live_web_port = 8081
tui = false

[dataset]
enabled = true
script = "scripts/prepare-ultra-fineweb-local.py"
output_dir = "data/ultra-fineweb-deepseek-512-bin"
sequence_length = 512
num_sequences = 2000000
shard_size = 8192
token_bytes = 4
dataset = "openbmb/Ultra-FineWeb"
split = "en"
text_field = "content"
tokenizer = "deepseek-ai/DeepSeek-V3"
seed = 1337
buffer_docs = 0
trust_remote_code = false

[model]
enabled = true
script = "scripts/push-new-model-hf.py"
config = "config/aether0-2b/model-config.json"
repo = "aethercompute/aether0-2b"
tokenizer = "deepseek-ai/DeepSeek-V3"
private = false
dtype = "bfloat16"
device = ""
